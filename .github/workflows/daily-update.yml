name: Daily Subway News Update

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0点 (北京时间 8点)
  workflow_dispatch:  # 手动触发
  push:
    branches: [master]

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
    
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Run news fetcher
      id: fetch
      run: |
        python fetch_news.py
      continue-on-error: true
    
    - name: Prepare data for frontend
      run: |
        if [ -f news_data.json ]; then
          echo "news_data.json created successfully"
          cat news_data.json | head -c 500
        else
          echo "Using fallback - no news_data.json found"
        fi
    
    - name: Update index.html with fresh data
      run: |
        python update_frontend.py || true
    
    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git config pull.rebase true
        
        # Check what files changed
        CHANGES=$(git status --porcelain)
        if [ -n "$CHANGES" ]; then
          echo "Changes detected:"
          echo "$CHANGES"
          git add -A
          git commit -m "Auto update: $(date '+%Y-%m-%d %H:%M:%S')"
          git pull --rebase
          git push
        else
          echo "No changes to commit"
        fi
