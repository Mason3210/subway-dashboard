name: Daily Subway News Update

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0点 (北京时间 8点)
  workflow_dispatch:  # 手动触发
  push:
    branches: [master]

jobs:
  update-news:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4 lxml Pillow urllib3 certifi
    
    - name: Run news fetcher
      id: fetch
      run: |
        python fetch_news.py
      continue-on-error: true
    
    - name: Prepare data for frontend
      run: |
        if [ -f news_data.json ]; then
          echo "news_data.json created successfully"
          cat news_data.json | head -c 500
        else
          echo "Using fallback - no news_data.json found"
        fi
    
    - name: Update index.html with fresh data
      run: |
        python update_frontend.py || true
    
    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
        # Check what files changed
        CHANGES=$(git status --porcelain)
        if [ -n "$CHANGES" ]; then
          echo "Changes detected:"
          echo "$CHANGES"
          git add -A
          git commit -m "Auto update: $(date '+%Y-%m-%d %H:%M:%S')"
          git push
        else
          echo "No changes to commit"
        fi
