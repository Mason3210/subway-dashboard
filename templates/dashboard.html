<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球轨道交通安全看板</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container-fluid">
        <!-- Header -->
        <div class="row mb-4">
            <div class="col-12">
                <h1 class="text-center mt-3">全球轨道交通安全看板</h1>
                <p class="text-center text-muted">Global Subway Safety Dashboard</p>
                <p class="text-center">
                    <small>数据更新时间: <span id="lastUpdated">加载中...</span></small>
                </p>
            </div>
        </div>

        <!-- Key Metrics Row -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card text-white bg-primary">
                    <div class="card-body">
                        <h5 class="card-title">全球安全事件</h5>
                        <h2 class="card-text" id="totalIncidents">0</h2>
                        <p class="card-text">本周新增: <span id="weeklyIncidents">0</span></p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-success">
                    <div class="card-body">
                        <h5 class="card-title">平均安全评分</h5>
                        <h2 class="card-text" id="avgSafetyScore">95</h2>
                        <p class="card-text">较上周: <span class="text-success">+2</span></p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-warning">
                    <div class="card-body">
                        <h5 class="card-title">合规性检查</h5>
                        <h2 class="card-text">98%</h2>
                        <p class="card-text">待处理: <span>3</span></p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-info">
                    <div class="card-body">
                        <h5 class="card-title">数据源状态</h5>
                        <h2 class="card-text" id="activeSources">3/3</h2>
                        <p class="card-text">全部正常</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Regional Safety Scores -->
        <div class="row mb-4">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h5>各地区安全评分对比</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="regionalChart" width="400" height="200"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5>数据源状态</h5>
                    </div>
                    <div class="card-body">
                        <div id="dataSources">
                            <!-- Data sources will be populated here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent Updates -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5>最新安全动态</h5>
                    </div>
                    <div class="card-body">
                        <div id="recentUpdates">
                            <p class="text-muted">加载最新安全信息...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Detailed Regional Data -->
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>中国地铁安全概览</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-6">
                                <p><strong>安全评分:</strong> <span id="chinaScore" class="text-success">95</span></p>
                                <p><strong>事故数量:</strong> <span id="chinaIncidents">0</span></p>
                            </div>
                            <div class="col-6">
                                <p><strong>合规率:</strong> <span class="text-success">99%</span></p>
                                <p><strong>检查次数:</strong> <span>156</span></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>国际地铁安全对比</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-4 text-center">
                                <h6>日本</h6>
                                <p class="text-success">98分</p>
                            </div>
                            <div class="col-4 text-center">
                                <h6>欧洲</h6>
                                <p class="text-success">96分</p>
                            </div>
                            <div class="col-4 text-center">
                                <h6>美洲</h6>
                                <p class="text-warning">92分</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
</body>
</html>
